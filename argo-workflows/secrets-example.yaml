# Example secrets configuration for the Argo Workflow
# Replace the base64 encoded values with your actual credentials
---
apiVersion: v1
kind: Secret
metadata:
  name: github-ssh-key
  namespace: argo-workflow
type: Opaque
data:
  # Base64 encoded SSH private key for accessing private GitHub repo
  # Generate: cat ~/.ssh/id_rsa | base64 -w 0
  ssh-privatekey: <BASE64_ENCODED_SSH_PRIVATE_KEY>

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-credentials
  namespace: argo-workflow
type: Opaque
data:
  # Base64 encoded Docker Hub password or access token
  # Generate: echo -n "your-docker-password" | base64
  password: <BASE64_ENCODED_DOCKER_PASSWORD>

---
apiVersion: v1
kind: Secret
metadata:
  name: dagger-cloud-token
  namespace: argo-workflow
type: Opaque
data:
  # Base64 encoded Dagger Cloud token (optional)
  # Generate: echo -n "your-dagger-cloud-token" | base64
  token: <BASE64_ENCODED_DAGGER_CLOUD_TOKEN>

---
apiVersion: v1
kind: Secret
metadata:
  name: coder-credentials
  namespace: argo-workflow
type: Opaque
data:
  # Base64 encoded Coder access token
  # Get token from Coder: coder tokens create --lifetime 8760h
  # Generate: echo -n "your-coder-token" | base64
  token: <BASE64_ENCODED_CODER_TOKEN>