name: Publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-developer-template:
    name: Publish Developer Template
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.publish.outputs.image }}
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          verb: call
          args: >-
            build-and-publish
            --source=./riksarkivet-developer-template
            --image-repository=riksarkivet/workspace-developer
            --image-tag=${{ steps.version.outputs.tag }}
            --registry=docker.io
            --username=${{ secrets.DOCKERHUB_USERNAME }}
            --password=env:DOCKERHUB_TOKEN
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: "latest"
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Get image digest
        id: publish
        env:
          IMAGE: docker.io/riksarkivet/workspace-developer
        run: |
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "digest=$(docker buildx imagetools inspect $IMAGE:${{ steps.version.outputs.tag }} --format '{{json .Manifest.Digest}}' | tr -d '\"')" >> "$GITHUB_OUTPUT"

  provenance:
    needs: [publish-developer-template]
    permissions:
      actions: read
      id-token: write
      packages: write
    if: startsWith(github.ref, 'refs/tags/')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.publish-developer-template.outputs.image }}
      digest: ${{ needs.publish-developer-template.outputs.digest }}
      private-repository: true
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
