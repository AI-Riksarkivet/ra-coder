name: Publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-developer-template:
    name: Publish Developer Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish developer template
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          verb: call
          args: >-
            build-and-publish
            --source=./riksarkivet-developer-template
            --image-repository=riksarkivet/workspace-developer
            --image-tag=${{ steps.version.outputs.tag }}
            --registry=docker.io
            --username=${{ secrets.DOCKERHUB_USERNAME }}
            --password=env:DOCKERHUB_SECRET
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: "latest"
        env:
          DOCKERHUB_SECRET: ${{ secrets.DOCKERHUB_SECRET }}
