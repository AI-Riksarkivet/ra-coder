---
# Namespace-specific RBAC fix for Dagger Engine Communication
# Issue #23: Dagger Engine RBAC Permissions Missing
#
# This adds minimal, namespace-scoped permissions for Dagger engine communication
# without granting cluster-wide pod/exec access

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: dagger
  name: dagger-pod-exec
  annotations:
    description: "Allows pod/exec access in dagger namespace for Dagger engine communication"
    issue: "https://github.com/riksarkivet/template/issues/23"
rules:
# Minimal permission: only pod/exec in dagger namespace
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
  # Optional: Restrict to specific pod names (uncomment and modify if needed)
  # resourceNames: ["dagger-dagger-helm-engine-*"]

---
# RoleBinding to grant coder-developer service account access to dagger namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coder-dagger-exec
  namespace: dagger
  annotations:
    description: "Grants coder-developer service account pod/exec access in dagger namespace"
    issue: "https://github.com/riksarkivet/template/issues/23"
subjects:
- kind: ServiceAccount
  name: coder-developer
  namespace: coder
roleRef:
  kind: Role
  name: dagger-pod-exec
  apiGroup: rbac.authorization.k8s.io

---
# Optional: Additional read permissions for Dagger engine pods (if needed)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: dagger
  name: dagger-pod-read
  annotations:
    description: "Read access to Dagger engine pods for status monitoring"
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coder-dagger-read
  namespace: dagger
  annotations:
    description: "Grants coder-developer read access to Dagger pods"
subjects:
- kind: ServiceAccount
  name: coder-developer
  namespace: coder
roleRef:
  kind: Role
  name: dagger-pod-read
  apiGroup: rbac.authorization.k8s.io