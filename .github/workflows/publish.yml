name: Publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-developer-template:
    name: Publish Developer Template
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.publish.outputs.image }}
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dagger
        uses: dagger/dagger-for-github@456fc3af63a2ba6f9789af9c55045b459115541b # v8.3.0
        with:
          verb: version
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: "latest"

      - name: Build, publish and get digest
        id: publish
        run: |
          ref=$(dagger call build-and-publish \
            --source=./riksarkivet-developer-template \
            --image-repository=riksarkivet/workspace-developer \
            --image-tag=${{ steps.version.outputs.tag }} \
            --registry=docker.io \
            --username=${{ secrets.DOCKERHUB_USERNAME }} \
            --password=env:DOCKERHUB_SECRET)
          echo "image=${ref%%@*}" >> "$GITHUB_OUTPUT"
          echo "digest=${ref#*@}" >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_SECRET: ${{ secrets.DOCKERHUB_SECRET }}

  provenance:
    needs: [publish-developer-template]
    permissions:
      actions: read
      id-token: write
      packages: write
    if: startsWith(github.ref, 'refs/tags/')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.publish-developer-template.outputs.image }}
      digest: ${{ needs.publish-developer-template.outputs.digest }}
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_SECRET }}
