apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: coder-agent-template-gpu-nightly-build
  namespace: ci
spec:
  schedule: "0 3 * * *"  # Run at 3 AM UTC every day (1 hour after developer template)
  timezone: "UTC"
  suspend: false
  concurrencyPolicy: "Replace"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  
  workflowSpec:
    activeDeadlineSeconds: 3600  # 1 hour deadline
    workflowTemplateRef:
      name: coder-template-build
    arguments:
      parameters:
      - name: source
        value: "./riksarkivet-agent-template"
      - name: cluster-name
        value: "agent-gpu"
      - name: image-repository
        value: "riksarkivet/workspace-agent"
      - name: image-tag
        value: "gpu-nightly-{{workflow.creationTimestamp.Y}}-{{workflow.creationTimestamp.m}}-{{workflow.creationTimestamp.d}}"
      - name: docker-username
        value: "airiksarkivet"
      - name: preset
        value: "Simple Development"
      - name: git-branch
        value: "main"
      - name: template-name
        value: "RA-Agent-GPU"
      - name: coder-url
        value: "http://coder.coder.svc.cluster.local"
      - name: template-params
        value: |
          [
            "AI Prompt=You are an intelligent agent assistant for automated tasks with GPU acceleration support"
          ]
      - name: env-vars
        value: |
          [
            "ENABLE_CUDA=true"
          ]