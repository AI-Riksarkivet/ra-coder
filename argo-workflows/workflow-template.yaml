
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: coder-template-build
  namespace: ci
spec:
  serviceAccountName: ci-service-account
  entrypoint: build-coder-template
  
  # Volume claims for Dagger
  volumeClaimTemplates:
  - metadata:
      name: dagger-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
          
  volumes:
  - name: dagger-socket
    emptyDir: {}
      
  templates:
  - name: build-coder-template
    inputs:
      parameters:
      - name: cluster-name
        value: "developer"
      - name: image-repository
        value: "riksarkivet/workspace-developer"
      - name: image-tag
        value: "v1.0.0"
      - name: docker-username
        value: "airiksarkivet"
      - name: preset
        value: "Small Development"
      - name: git-branch
        value: "main"
      - name: git-username
        value: "carpelan"
      - name: template-name
        value: "Riksarkivets-Developer-Template"
      # JSON array of template params as key=value pairs
      - name: template-params
        value: |
          [
            "dotfiles_uri=https://github.com/AI-Riksarkivet/dotfiles",
            "AI Prompt="
          ]
      # JSON array of env vars as key=value pairs  
      - name: env-vars
        value: |
          [
            "ENABLE_CUDA=false"
          ]
        
    sidecars:
    - name: dagger-engine
      image: registry.dagger.io/engine:v0.18.14-gpu
      command: ["/usr/local/bin/dagger-engine"]
      securityContext:
        privileged: true
        capabilities:
          add:
          - ALL
      env:
      - name: _EXPERIMENTAL_DAGGER_GPU_SUPPORT
        value: "true"
      - name: DO_NOT_TRACK
        value: "1"
      - name: DAGGER_CLOUD_TOKEN
        valueFrom:
          secretKeyRef:
            name: dagger-cloud-token
            key: token
      volumeMounts:
      - name: dagger-socket
        mountPath: /run/dagger
      - name: dagger-storage
        mountPath: /var/lib/dagger
      #readinessProbe:
      #  exec:
      #    command: ["dagger", "core", "version"]
      #  initialDelaySeconds: 10
      #  periodSeconds: 10
      #  timeoutSeconds: 5
      #  failureThreshold: 3
        
    script:
      image: alpine:latest
      command: [sh]
      env:
      - name: _EXPERIMENTAL_DAGGER_RUNNER_HOST
        value: "unix:///run/dagger/engine.sock"
      - name: DOCKER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: docker-registry-credentials
            key: password
      - name: CODER_URL
        value: "http://coder.coder.svc.cluster.local"
      - name: CODER_USERNAME
        valueFrom:
          secretKeyRef:
            name: coder-credentials
            key: username
      - name: CODER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: coder-credentials  
            key: password
      - name: GITHUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: github-credentials
            key: token
      - name: DAGGER_CLOUD_TOKEN
        valueFrom:
          secretKeyRef:
            name: dagger-cloud-token
            key: token
            optional: true
      volumeMounts:
      - name: dagger-socket
        mountPath: /run/dagger
        
      source: |
        #!/bin/sh
        set -ex  # Enable verbose mode and exit on error
        
        echo "=== Starting Dagger Build Pipeline ==="
        echo "Workflow started at: $(date)"
        echo "Current user: $(whoami)"
        echo "Current directory: $(pwd)"
        
        echo "=== Creating workspace directory ==="
        mkdir -p /workspace
        cd /workspace
        echo "Changed to workspace directory: $(pwd)"
        
        # Install required tools
        echo "=== Installing curl and jq ==="
        apk add --no-cache curl jq git openssh-client bash
        
        # Clone the repository using HTTPS with token authentication
        echo "=== Cloning repository ==="
        GIT_USERNAME="{{inputs.parameters.git-username}}"
        REPO_URL="https://${GIT_USERNAME}:${GITHUB_TOKEN}@github.com/AI-Riksarkivet/coder-templates.git"
        GIT_BRANCH="{{inputs.parameters.git-branch}}"
        echo "Cloning repository with authentication (branch: $GIT_BRANCH)"
        git clone --depth 1 --branch "$GIT_BRANCH" "$REPO_URL" . || {
          echo "Failed to clone repository, trying without branch specification"
          git clone --depth 1 "$REPO_URL" . || {
            echo "ERROR: Failed to clone repository completely"
            exit 1
          }
        }
        
        echo "Repository cloned successfully!"
        echo "Repository contents:"
        ls -la
        
        # Install dagger CLI
        echo "=== Installing Dagger CLI ==="
        curl -L https://dl.dagger.io/dagger/install.sh | sh
        # Move dagger from ./bin to /usr/local/bin
        if [ -f "./bin/dagger" ]; then
          mv ./bin/dagger /usr/local/bin/dagger
          chmod +x /usr/local/bin/dagger
          echo "Dagger CLI moved to /usr/local/bin/"
        fi
        export PATH="/usr/local/bin:$PATH"
        
        # Install Coder CLI
        echo "=== Installing Coder CLI ==="
        curl -fsSL "${CODER_URL}/install.sh" | sh
        if [ -f "./bin/coder" ]; then
          mv ./bin/coder /usr/local/bin/coder
          chmod +x /usr/local/bin/coder
          echo "Coder CLI moved to /usr/local/bin/"
        fi
        
        # Generate Coder token via API
        echo "=== Generating Coder API token via API ==="
        CODER_TOKEN=$(curl -X POST "${CODER_URL}/api/v2/users/login" \
          -H "Content-Type: application/json" \
          -d "{\"email\":\"buildagent@riksarkivet.se\",\"password\":\"${CODER_PASSWORD}\"}" \
          -s | jq -r '.session_token')
        
        if [ -z "$CODER_TOKEN" ] || [ "$CODER_TOKEN" = "null" ]; then
          echo "ERROR: Failed to authenticate with Coder"
          exit 1
        fi
        
        export CODER_TOKEN
        echo "Coder token generated successfully: token starts with ${CODER_TOKEN:0:10}..."
        
        echo "=== Verifying workspace setup ==="
        echo "Current directory: $(pwd)"
        echo "Workspace contents after clone:"
        ls -la
        
        # Build the dagger command with dynamic parameters
        DAGGER_CMD="dagger call build-pipeline"
        DAGGER_CMD="$DAGGER_CMD --cluster-name={{inputs.parameters.cluster-name}}"
        DAGGER_CMD="$DAGGER_CMD --source=./riksarkivet-developer-template"
        DAGGER_CMD="$DAGGER_CMD --docker-password=env:DOCKER_PASSWORD"
        DAGGER_CMD="$DAGGER_CMD --docker-username={{inputs.parameters.docker-username}}"
        DAGGER_CMD="$DAGGER_CMD --image-repository={{inputs.parameters.image-repository}}"
        DAGGER_CMD="$DAGGER_CMD --image-tag={{inputs.parameters.image-tag}}"
        DAGGER_CMD="$DAGGER_CMD --preset \"{{inputs.parameters.preset}}\""
        DAGGER_CMD="$DAGGER_CMD --coder-url=${CODER_URL}"
        DAGGER_CMD="$DAGGER_CMD --coder-token=env:CODER_TOKEN"
        DAGGER_CMD="$DAGGER_CMD --template-name={{inputs.parameters.template-name}}"
        
        # Parse and add template-params
        while IFS= read -r param; do
          DAGGER_CMD="$DAGGER_CMD --template-params \"$param\""
        done < <(echo '{{inputs.parameters.template-params}}' | jq -r '.[]')
        
        # Parse and add env-vars
        while IFS= read -r var; do
          DAGGER_CMD="$DAGGER_CMD --env-vars=\"$var\""
        done < <(echo '{{inputs.parameters.env-vars}}' | jq -r '.[]')
        
        echo "=== Executing Dagger command ==="
        echo "Command: $DAGGER_CMD"
        
        # Check if .dagger directory exists
        echo "=== Checking for .dagger directory ==="
        if [ -d ".dagger" ]; then
          echo ".dagger directory found"
          ls -la .dagger/
        else
          echo "ERROR: .dagger directory not found!"
          echo "Current directory contents:"
          ls -la
          exit 1
        fi
        
        # Execute the built command
        echo "=== Running Dagger pipeline ==="
        eval "$DAGGER_CMD" || {
          echo "ERROR: Dagger command failed with exit code $?"
          exit 1
        }
        
        echo "=== Build completed successfully! ==="