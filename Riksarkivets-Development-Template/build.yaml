apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: kaniko-build-devenv
spec:
  serviceAccountName: ci-service-account
  entrypoint: kaniko-build
  arguments:
    parameters:
      - name: dockerfileContent
      - name: enableCuda
        value: "true"
      - name: imageName
        value: "registry.ra.se:5002/airiksarkivet/devenv:v9.0.0" 
  templates:
    - name: kaniko-build
      dag:
        tasks:
          - name: build-image
            template: kaniko
            arguments:
              artifacts:
                - name: dockerfile 
                  raw:
                    data: "{{workflow.parameters.dockerfileContent}}"
    - name: kaniko
      inputs:
        artifacts:
          - name: dockerfile 
            path: /workspace/Dockerfile 
      container:
        image: registry.ra.se:5002/gcr.io/kaniko-project/executor:latest 
        command: ["/kaniko/executor"]
        args:
          - --context=dir:///workspace
          - --dockerfile=/workspace/Dockerfile
          - --destination={{workflow.parameters.imageName}}
          - --insecure
          - --insecure-registry=registry.ra.se:5002
          - --build-arg=ENABLE_CUDA={{workflow.parameters.enableCuda}}
        volumeMounts:
          - name: workspace
            mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}